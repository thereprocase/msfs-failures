<script type="text/babel">

// ---- live state -------------------------------------------------------------
const AC = {

  binding: 'C208B.default v1.2',

const S = {

const ROUTE = [
  { id: 'KAPA', t: '13:54Z' },
  { id: 'DBL',  t: '14:14Z' },
  { id: 'JNC',  t: '14:42Z' },
  { id: 'LKV',  t: '15:18Z' },
  { id: 'KSEZ', t: '15:46Z' },
];
const ROUTE_PROGRESS = 0.42;

const EVENTS = [
  { t: '14:08:11', kind: 'phase', msg: 'LIFTOFF · gear/strut wear sample taken (vs 412 fpm, weight 8624 lb)' },
  { t: '14:08:42', kind: 'wear',  msg: 'Cycle counter → 2106 · landing-gear cycle logged' },
  { t: '14:14:02', kind: 'warn',  msg: 'ITT peaked 712°C in climb · added 0.4 °C·s to overtemp debt' },
  { t: '14:18:30', kind: 'phase', msg: 'TOC reached · cruise wear profile engaged' },
  { t: '14:19:04', kind: 'note',  msg: 'Compressor efficiency held at 87.3% (was 92.0% new)' },
  { t: '14:31:18', kind: 'wear',  msg: 'Tick · oil consumed 0.18 qt this leg · within trend band' },
  { t: '15:02:55', kind: 'note',  msg: 'Same-power climb cost +18 fpm fuel for −12 fpm climb vs new-engine baseline' },

const ITT_TREND = [612,634,656,672,684,698,712,706,694,688,684,682,684,685,686,684,683,685,686,685];
const TQ_TREND  = [880,1100,1320,1540,1700,1820,1865,1820,1690,1560,1480,1420,1410,1408,1410,1412,1410,1411,1410,1410];
const OIL_TREND_30D = [13.2,13.0,12.8,12.6,12.5,12.3,12.1,12.0,11.9,11.8,11.7,11.6,11.5,11.5,11.4]; // qt at preflight, last 15 flights

// ---- atoms ------------------------------------------------------------------
const Mono = ({ children, c = P.text, w = 600, s = 11 }) =>
  <span style={{ fontFamily: P.mono, fontSize: s, color: c, fontWeight: w }}>{children}</span>;
const Lab = ({ children, c = P.faint }) =>
  <span style={{ fontFamily: P.mono, fontSize: 9, letterSpacing: '0.16em', color: c }}>{children}</span>;

const Block = ({ title, right, children, pad = 14 }) => (
  <div style={{ background: P.panel, border: '1px solid ' + P.border, borderRadius: 3, display: 'flex', flexDirection: 'column', flexShrink: 0 }}>
    <div style={{ padding: '8px 12px', borderBottom: '1px solid ' + P.border, display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 8, background: '#100e0a' }}>
      <span style={{ fontFamily: P.mono, fontSize: 9, letterSpacing: '0.16em', color: P.amber, fontWeight: 700 }}>[{title}]</span>
      {right}
    </div>
    <div style={{ padding: pad }}>{children}</div>
  </div>
);

const healthColor = (v) => v < 0.4 ? P.red : v < 0.65 ? P.orange : v < 0.85 ? P.amber : P.green;

const Spark = ({ data, color, height = 24, redline, caution, fill = false }) => {
  const min = Math.min(...data), max = Math.max(...data);
  const range = max - min || 1;
  const w = 100;
  const pts = data.map((v, i) => `${(i/(data.length-1))*w},${height - ((v-min)/range)*height}`).join(' ');
  return (
    <svg width="100%" viewBox={`0 0 ${w} ${height}`} preserveAspectRatio="none" style={{ display: 'block' }}>
      {redline != null && <line x1="0" x2={w} y1={height-((redline-min)/range)*height} y2={height-((redline-min)/range)*height} stroke={P.red} strokeWidth="0.4" strokeDasharray="2,1" opacity="0.6"/>}
      {caution != null && <line x1="0" x2={w} y1={height-((caution-min)/range)*height} y2={height-((caution-min)/range)*height} stroke={P.amber} strokeWidth="0.4" strokeDasharray="2,1" opacity="0.5"/>}
      {fill && <polygon points={`0,${height} ${pts} ${w},${height}`} fill={color} opacity="0.15"/>}
      <polyline points={pts} fill="none" stroke={color} strokeWidth="1" vectorEffect="non-scaling-stroke"/>
    </svg>
  );
};

const Bar = ({ value, max = 1, min = 0, color, caution, redline }) => {
  const pct = Math.max(0, Math.min(1, (value - min)/(max - min)));
  return (
    <div style={{ position: 'relative', height: 5, background: 'rgba(255,255,255,.04)' }}>
      <div style={{ width: pct*100 + '%', height: '100%', background: color, transition: 'width .2s' }}/>
      {caution != null && <div style={{ position: 'absolute', left: ((caution-min)/(max-min))*100 + '%', top: -2, width: 1, height: 9, background: P.amber }}/>}
      {redline != null && <div style={{ position: 'absolute', left: ((redline-min)/(max-min))*100 + '%', top: -2, width: 1, height: 9, background: P.red }}/>}
    </div>
  );
};

// ---- header strip -----------------------------------------------------------
const TermHeader = () => (
  <div style={{ background: '#0a0907', borderBottom: '1px solid ' + P.border, padding: '8px 18px', display: 'flex', alignItems: 'center', gap: 18, fontFamily: P.mono, fontSize: 11, color: P.dim, letterSpacing: '0.04em' }}>
    <span style={{ color: P.amber, fontWeight: 700 }}>msfs-failures</span>
    <span style={{ color: P.faint }}>v0.1.0-alpha</span>
    <span style={{ color: P.faint }}>·</span>
    <span>2026-04-30 15:25:42Z</span>
    <span style={{ color: P.faint }}>·</span>
    <span>UPTIME 02:31:14</span>
    <span style={{ flex: 1 }}/>
    <span style={{ color: P.faint }}>BINDING</span>
    <span>{AC.binding}</span>
    <span style={{ color: P.faint }}>·</span>
    <span style={{ color: P.green, fontWeight: 700, display: 'inline-flex', alignItems: 'center', gap: 6 }}>
      <span style={{ width: 6, height: 6, borderRadius: '50%', background: P.green, animation: 'vpulse 2s infinite' }}/>

    </span>
  </div>
);

const TabBar = () => (
  <div style={{ display: 'flex', borderBottom: '1px solid ' + P.border, background: '#100e0a', paddingLeft: 12 }}>
    {[['FLEET',5,false],['IN FLIGHT',null,true],['SQUAWKS',6,false],['MAINTENANCE',1,false],['SESSIONS',null,false],['AIRFRAME EDITOR',null,false],['BINDINGS',null,false],['LOG',null,false]].map(([l,n,a]) => (
      <button key={l} style={{ background:'transparent', color: a?P.amber:P.dim, border:'none', borderRight:'1px solid '+P.border, borderBottom: a?'2px solid '+P.amber:'2px solid transparent', padding:'10px 14px', fontFamily:P.mono, fontSize:10, fontWeight:600, letterSpacing:'0.12em', cursor:'pointer', display:'flex', alignItems:'center', gap:6, marginBottom:-1 }}>
        {l}
        {a && <span style={{ width:6, height:6, borderRadius:'50%', background:P.green, animation:'vpulse 2s infinite', marginLeft:4 }}/>}
        {n!=null && <span style={{ color: a?P.amber:P.faint, fontSize:9 }}>[{n}]</span>}
      </button>
    ))}
  </div>
);

const LiveStrip = () => (
  <div style={{ background: P.panel, borderBottom: '1px solid '+P.border, padding: '10px 18px', display:'flex', alignItems:'center', gap: 22, fontFamily: P.mono, fontSize: 11 }}>
    <span style={{ color: P.green, fontWeight:700, letterSpacing:'0.16em', display:'inline-flex', alignItems:'center', gap:6 }}>
      <span style={{ width:7, height:7, borderRadius:'50%', background:P.green, animation:'vpulse 2s infinite' }}/>
      LIVE
    </span>
    <span style={{ color: P.text, fontWeight: 700 }}>{AC.tail}</span>
    <span style={{ color: P.dim }}>{AC.type}</span>
    <span style={{ color: P.faint }}>·</span>
    <span style={{ color: P.amber, letterSpacing: '0.12em', fontWeight: 600 }}>{S.phase}</span>
    <span style={{ flex: 1 }}/>
    {[
      ['ALT', S.alt.toLocaleString()+' ft'],
      ['IAS', S.ias+' kt'], ['TAS', S.tas+' kt'], ['GS', S.gs+' kt'],
      ['HDG', String(S.hdg).padStart(3,'0')+'°'], ['OAT', S.oat+'°C'],
      ['ITT', S.itt+'°C'], ['TQ', S.torque+' ft·lb'], ['FF', S.fuelFlow+' pph'],
    ].map(([k,v]) => (
      <span key={k} style={{ display:'inline-flex', gap:5, alignItems:'baseline' }}>
        <span style={{ color: P.faint, fontSize: 9, letterSpacing: '0.1em' }}>{k}</span>
        <span style={{ color: P.text, fontWeight: 600 }}>{v}</span>
      </span>
    ))}
  </div>
);

// ---- BIG decision surface: dispatch posture --------------------------------

  // Engine condition index, hot section margin, thermal budget remaining, dispatch posture
  const thermalBudget = 0.72; // 72% of allowable thermal damage budget remaining for this leg
  const fuelClean = true;
  return (
    <Block title="DISPATCH POSTURE · HEALTH SURFACE" right={
      <span style={{ display:'inline-flex', gap: 12, alignItems: 'baseline' }}>
        <Lab>HOBBS</Lab>
        <Mono c={P.text} s={10}>{AC.hobbsNow.toFixed(1)}</Mono>
        <Mono c={P.green} s={10} w={700}>+{(AC.hobbsNow-AC.hobbsStart).toFixed(1)}</Mono>
      </span>
    }>
      <div style={{ display: 'grid', gridTemplateColumns: '1.4fr 1fr 1fr', gap: 16 }}>
        {/* Engine condition donut */}
        <div style={{ display: 'flex', gap: 14, alignItems: 'center' }}>
          <Donut value={H.engine.v} size={108} color={healthColor(H.engine.v)}/>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 4, minWidth: 0 }}>
            <Lab>ENGINE CONDITION INDEX</Lab>
            <Mono c={healthColor(H.engine.v)} s={28} w={700}>{Math.round(H.engine.v*100)}<span style={{ color: P.faint, fontSize: 14, marginLeft: 3 }}>%</span></Mono>
            <Mono c={P.dim} s={10} w={500}>composite of hot section · compressor · oil · prop</Mono>
            <div style={{ marginTop: 4, display: 'flex', gap: 6 }}>
              <Chip c={P.amber}>WASH DUE</Chip>
              <Chip c={P.dim}>HSI 1382 h</Chip>
            </div>
          </div>
        </div>

        {/* Thermal margin */}
        <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline' }}>
            <Lab>THERMAL MARGIN · ITT</Lab>
            <Mono c={P.green} s={10} w={700}>140°C BELOW LIMIT</Mono>
          </div>
          <Mono c={P.text} s={26} w={700}>685<span style={{ color:P.faint, fontSize:14, marginLeft:4 }}>°C</span><span style={{ color:P.faint, fontSize: 12, marginLeft: 8 }}>/ 825 lim</span></Mono>

          <div style={{ display: 'flex', justifyContent: 'space-between' }}>

            <div><Lab>OT DEBT</Lab><Mono c={P.amber} s={13} w={700}>+0.4 °C·s</Mono></div>
            <div><Lab>EXC TODAY</Lab><Mono c={P.dim} s={13} w={700}>0</Mono></div>
          </div>
        </div>

        {/* Fuel + endurance */}
        <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline' }}>
            <Lab>FUEL · ENDURANCE</Lab>
            <Mono c={fuelClean ? P.green : P.amber} s={10} w={700}>{fuelClean ? '◇ CLEAN · 4.2 h SINCE SAMPLE' : '⚠ CONTAMINATION SUSPECTED'}</Mono>
          </div>
          <Mono c={P.text} s={26} w={700}>{(S.fuelLb/S.fuelFlow).toFixed(1)}<span style={{ color: P.faint, fontSize: 14, marginLeft: 4 }}>h</span></Mono>
          <Bar value={S.fuelLb} max={2240} color={P.green}/>
          <div style={{ display: 'flex', justifyContent: 'space-between' }}>
            <div><Lab>ON BOARD</Lab><Mono c={P.text} s={13} w={700}>{S.fuelLb.toLocaleString()} lb</Mono></div>
            <div><Lab>BURN</Lab><Mono c={P.text} s={13} w={700}>{S.fuelFlow} pph</Mono></div>
            <div><Lab>RES @ ARR</Lab><Mono c={P.green} s={13} w={700}>+{((S.fuelLb/S.fuelFlow)-0.86-0.32).toFixed(1)}h</Mono></div>
          </div>
        </div>
      </div>
    </Block>
  );
};

const Donut = ({ value, size = 100, color }) => {
  const r = size/2 - 6;
  const c = 2 * Math.PI * r;
  const off = c * (1 - value);
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,.06)" strokeWidth="6"/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth="6"
              strokeDasharray={c} strokeDashoffset={off} strokeLinecap="round"
              transform={`rotate(-90 ${size/2} ${size/2})`}/>
      <text x={size/2} y={size/2+1} textAnchor="middle" dominantBaseline="middle"
            fontFamily={P.mono} fontSize={size*0.26} fontWeight={700} fill={color}>
        {Math.round(value*100)}
      </text>
    </svg>
  );
};

const ScaleBar = ({ value, min, max, caution, redline }) => {
  const pct = (value - min) / (max - min);
  return (
    <div style={{ position: 'relative', height: 10, background: 'rgba(255,255,255,.04)', borderRadius: 1 }}>
      <div style={{
        position: 'absolute', top: 0, left: 0, height: '100%',
        width: ((caution - min)/(max-min))*100 + '%', background: 'rgba(168,201,122,.20)',
      }}/>
      <div style={{
        position: 'absolute', top: 0, height: '100%',
        left: ((caution-min)/(max-min))*100 + '%',
        width: ((redline-caution)/(max-min))*100 + '%', background: 'rgba(212,162,76,.25)',
      }}/>
      <div style={{
        position: 'absolute', top: 0, height: '100%',
        left: ((redline-min)/(max-min))*100 + '%',
        right: 0, background: 'rgba(194,84,80,.25)',
      }}/>
      <div style={{ position: 'absolute', left: pct*100 + '%', top: -3, width: 2, height: 16, background: P.text, transform: 'translateX(-1px)' }}/>
    </div>
  );
};

const Chip = ({ children, c }) => (
  <span style={{ fontFamily: P.mono, fontSize: 9, fontWeight: 700, letterSpacing: '0.1em', color: c, padding: '2px 6px', border: '1px solid '+c+'55', borderRadius: 2 }}>
    {children}
  </span>
);

// ---- Subsystem health grid (8 systems, decision-surface) -------------------
const SubsystemGrid = () => (
  <Block title="SUBSYSTEM HEALTH · 8 INDICES" right={<Mono c={P.dim} s={10}>derived from ledger + live tick</Mono>}>
    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 12 }}>
      {Object.entries(H).map(([k, h]) => (
        <SubCard key={k} h={h}/>
      ))}
    </div>
  </Block>
);

const SubCard = ({ h }) => {
  const c = healthColor(h.v);
  return (
    <div style={{ background: P.panel2, border: '1px solid '+P.border, borderRadius: 2, padding: 10, display: 'flex', flexDirection: 'column', gap: 6 }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline' }}>
        <Lab c={P.dim}>{h.label}</Lab>
        <Mono c={c} s={14} w={700}>{Math.round(h.v*100)}%</Mono>
      </div>
      <Bar value={h.v} color={c}/>
      <Mono c={P.faint} s={9} w={500}>{h.sub}</Mono>
    </div>
  );
};

// ---- Engine deep dive (PT6A specific) ---------------------------------------
const EnginePanel = () => (
  <Block title={`ENGINE · ${AC.engine}`} right={<Mono c={P.green} s={9} w={700}>● NOMINAL · 1758 h TO TBO</Mono>}>
    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 14 }}>
      <Gauge label="ITT"    value={S.itt}    unit="°C"    max={840}  caution={765}  redline={825}/>
      <Gauge label="TORQUE" value={S.torque} unit="ft·lb" max={2230} caution={1865} redline={1970}/>
      <Gauge label="Ng"     value={S.ng}     unit="%"     max={104}  caution={101.5} redline={102}/>
      <Gauge label="Np"     value={S.np}     unit="rpm"   max={2200} caution={1900} redline={2080}/>
    </div>
    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14, marginTop: 12, paddingTop: 12, borderTop: '1px dashed '+P.rule }}>
      <Trend title="ITT · last 5 min"    data={ITT_TREND} unit="°C"    now={S.itt}    caution={765}  redline={825}/>
      <Trend title="TORQUE · last 5 min" data={TQ_TREND}  unit="ft·lb" now={S.torque} caution={1865} redline={1970}/>
    </div>
  </Block>
);

const Gauge = ({ label, value, unit, max, caution, redline, min = 0 }) => (
  <div style={{ display: 'flex', flexDirection: 'column', gap: 5 }}>
    <div style={{ display: 'flex', justifyContent: 'space-between' }}>
      <Lab>{label}</Lab><Mono c={P.faint} s={9}>{unit}</Mono>
    </div>
    <Mono c={redline!=null && value>redline ? P.red : caution!=null && value>caution ? P.amber : P.text} s={20} w={700}>{value}</Mono>
    <Bar value={value} min={min} max={max} caution={caution} redline={redline} color={P.green}/>
  </div>
);

const Trend = ({ title, data, unit, now, caution, redline }) => {
  const peak = Math.max(...data);
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 5 }}>
      <div style={{ display: 'flex', justifyContent: 'space-between' }}>
        <Lab>{title}</Lab><Mono c={P.faint} s={9}>{unit}</Mono>
      </div>
      <div style={{ height: 32 }}><Spark data={data} color={P.green} height={32} caution={caution} redline={redline} fill/></div>
      <div style={{ display: 'flex', justifyContent: 'space-between', fontFamily: P.mono, fontSize: 10 }}>
        <span style={{ color: P.faint }}>NOW <span style={{ color: P.text, fontWeight: 600, marginLeft: 4 }}>{now}</span></span>
        <span style={{ color: P.faint }}>PEAK <span style={{ color: peak>redline ? P.red : peak>caution ? P.amber : P.text, fontWeight: 600, marginLeft: 4 }}>{peak}</span></span>
        <span style={{ color: P.faint }}>AVG <span style={{ color: P.text, fontWeight: 600, marginLeft: 4 }}>{Math.round(data.reduce((a,b)=>a+b,0)/data.length)}</span></span>
      </div>
    </div>
  );
};

    { k: 'Torque exceedances',  v: 2, max: 5, unit: 'events',    tone: 'warn',  note: 'last: 14:14 · +95 ft·lb · 4.1 s' },

      <Mono c={c} s={15} w={700}>{delta}</Mono>

          const x = (i / (ROUTE.length - 1)) * 100;

          return (
            <div key={wp.id} style={{ position: 'absolute', left: x+'%', top: -4, transform: 'translateX(-50%)', width: 10, height: 10, borderRadius: '50%', background: here ? P.amber : passed ? P.green : P.panel2, border: '2px solid '+(here ? P.amber : passed ? P.green : P.faint), boxShadow: here ? '0 0 0 4px rgba(212,162,76,.15)' : 'none' }}/>

      <div style={{ position: 'relative', height: 22, marginTop: 4 }}>
        {ROUTE.map((wp, i) => {
