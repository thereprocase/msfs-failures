<!doctype html>

<script type="text/babel">

  ink:       '#1f2630',
  ink2:      '#3d4654',
  muted:     '#7a8595',
  faint:     '#aab1bc',
  hair:      '#e6e8ec',
  rule:      '#eef0f3',
  red:       '#d50032',     // Daher red

  redDeep:   '#a3001f',
  green:     '#2a8f5e',
  greenSoft: '#e6f3ec',
  amber:     '#c97a14',
  amberSoft: '#fbf1de',
  blue:      '#1f5fa8',
  blueSoft:  '#e3edf8',
  navy:      '#0d2236',
  mono:      '"Roboto Mono", "SF Mono", Consolas, monospace',

// ---------- iPad bezel + status bar ------------------------------------------

const BatteryIcon = () => (

// ---------- App bar (Daher Me & My TBM) --------------------------------------
const AppBar = () => (

    }}>
      <Avatar/>
      <div style={{ display:'flex', flexDirection:'column' }}>

        <span style={{ fontSize:11, color:D.muted }}>PIC · ATP/SE-Turboprop</span>

const DaherMark = () => (
  <div style={{ display:'flex', alignItems:'center', gap:10 }}>

    <div style={{ display:'flex', flexDirection:'column', gap:1 }}>
      <span style={{ fontSize:13, fontWeight:700, color:D.ink, letterSpacing:'0.02em' }}>DAHER</span>
      <span style={{ fontSize:9, fontWeight:600, color:D.muted, letterSpacing:'0.16em' }}>TBM 910 · 940 · 960</span>
    </div>

);

const SearchBox = () => (
  <div style={{ display:'flex', alignItems:'center', gap:8, background:D.bg, border:'1px solid '+D.hair, borderRadius:8, padding:'7px 12px', width:240 }}>
    <span style={{ color:D.faint, fontSize:13 }}>􀊫</span>
    <span style={{ fontSize:13, color:D.muted }}>Search MEL, AD/SB, parts…</span>
    <span style={{ flex:1 }}/>
    <span style={{ fontSize:10, color:D.faint, border:'1px solid '+D.hair, padding:'1px 5px', borderRadius:3 }}>⌘K</span>
  </div>
);

const IconBtn = ({ glyph, badge }) => (
  <button style={{ position:'relative', width:36, height:36, borderRadius:8, border:'1px solid '+D.hair, background:'#fff', color:D.ink2, fontSize:15, cursor:'pointer' }}>
    {glyph}
    {badge && <span style={{ position:'absolute', top:-4, right:-4, background:D.red, color:'#fff', fontSize:9, fontWeight:700, padding:'1px 5px', borderRadius:9 }}>{badge}</span>}

);

const Avatar = () => (
  <div style={{ width:34, height:34, borderRadius:'50%', background:'linear-gradient(135deg,#446b8e,#1f3550)', color:'#fff', display:'flex', alignItems:'center', justifyContent:'center', fontWeight:700, fontSize:13 }}>MB</div>
);

// ---------- Aircraft strip (the page header) ---------------------------------
const AircraftStrip = () => (
  <div style={{ flex:'0 0 auto', background:'#fff', borderBottom:'1px solid '+D.hair, padding: '14px 22px', display:'flex', alignItems:'center', gap:22 }}>
    <TBMSilhouette/>
    <div style={{ display:'flex', flexDirection:'column', gap:2 }}>
      <div style={{ display:'flex', alignItems:'baseline', gap:10 }}>
        <span style={{ fontSize:24, fontWeight:800, color:D.ink, letterSpacing:'-0.01em' }}>N950DT</span>
        <Pill tone="green">AIRWORTHY</Pill>
        <Pill tone="amber">2 ITEMS DUE ≤10 H</Pill>
      </div>
      <div style={{ fontSize:12, color:D.muted, letterSpacing:'0.02em' }}>
        TBM 950 · MSN 1421 · S/N PT6A-66D / RB-0814 · COA exp 2027-08-31

    </div>
    <div style={{ flex:1 }}/>
    <KPI label="Airframe Time"   value="1,842.6"  unit="hrs"    sub="↑ 312.4 YTD"/>
    <KPI label="Cycles"          value="2,106"   unit="ldgs"    sub="+184 YTD"/>
    <KPI label="Engine Time"     value="1,842.6" unit="hrs"     sub="TBO 3,600"/>
    <KPI label="Hobbs"           value="1,844.1" unit="hrs"    sub="last leg 1.5"/>
    <button style={{ padding:'10px 16px', background:D.red, color:'#fff', border:'none', borderRadius:8, fontWeight:700, fontSize:13, cursor:'pointer', letterSpacing:'0.02em' }}>RELEASE FOR FLIGHT</button>
  </div>
);

const TBMSilhouette = () => (
  <div style={{ width:96, height:64, background:D.bg, borderRadius:10, border:'1px solid '+D.hair, display:'flex', alignItems:'center', justifyContent:'center' }}>
    <svg width="80" height="48" viewBox="0 0 80 48">
      <g fill={D.ink} fillOpacity="0.85">
        {/* fuselage */}
        <path d="M6 24 Q10 19 18 18 L60 19 Q72 20 76 24 Q72 28 60 29 L18 30 Q10 29 6 24 Z"/>
        {/* wing */}
        <path d="M20 22 L40 12 L52 12 L48 24 Z" opacity="0.65"/>
        <path d="M20 26 L40 36 L52 36 L48 24 Z" opacity="0.65"/>
        {/* tail */}
        <path d="M62 22 L72 10 L74 10 L66 24 Z" opacity="0.7"/>
        <path d="M62 26 L72 38 L74 38 L66 24 Z" opacity="0.7"/>
        {/* prop */}
        <line x1="6" y1="14" x2="6" y2="34" stroke={D.ink} strokeWidth="1.2"/>
        <circle cx="6" cy="24" r="1.6" fill={D.red}/>
      </g>
    </svg>
  </div>
);

const KPI = ({ label, value, unit, sub }) => (
  <div style={{ display:'flex', flexDirection:'column', gap:1, paddingLeft:18, borderLeft:'1px solid '+D.hair, minWidth: 100 }}>
    <span style={{ fontSize:10, color:D.muted, letterSpacing:'0.08em', fontWeight:600 }}>{label.toUpperCase()}</span>
    <span style={{ fontFamily:D.mono, fontSize:18, color:D.ink, fontWeight:700, letterSpacing:'-0.01em' }}>
      {value}<span style={{ fontSize:10, color:D.muted, marginLeft:4, fontWeight:500 }}>{unit}</span>
    </span>
    <span style={{ fontSize:10, color:D.muted }}>{sub}</span>
  </div>
);

const Pill = ({ tone='green', children }) => {
  const map = {
    green: [D.green, D.greenSoft],
    amber: [D.amber, D.amberSoft],
    red:   [D.red,   D.redSoft],
    blue:  [D.blue,  D.blueSoft],
    grey:  [D.muted, D.bg],
  }[tone];
  return (
    <span style={{
      display:'inline-flex', alignItems:'center', gap:5, padding:'2px 8px', borderRadius:11,
      background: map[1], color: map[0], fontSize:10, fontWeight:700, letterSpacing:'0.06em',
    }}>
      <span style={{ width:6, height:6, borderRadius:'50%', background:map[0] }}/>
      {children}
    </span>
  );
};

// ---------- Tab nav ----------------------------------------------------------
const TabNav = () => {
  const tabs = [
    { l: 'Pre-Flight',     active: true,  badge: 2 },
    { l: 'Logbook',        active: false },
    { l: 'Limitations',    active: false },
    { l: 'AD / SB',        active: false, badge: 1 },
    { l: 'Squawks',        active: false, badge: 4 },
    { l: 'Inspections',    active: false },
    { l: 'Fuel & Oil',     active: false },
    { l: 'Engine Trend',   active: false },
    { l: 'CAS History',    active: false },
    { l: 'Documents',      active: false },
  ];
  return (
    <div style={{ flex:'0 0 auto', background:'#fff', borderBottom:'1px solid '+D.hair, paddingLeft: 14, display:'flex' }}>
      {tabs.map(t => (
        <button key={t.l} style={{
          background:'transparent', border:'none', padding:'12px 16px', cursor:'pointer',
          color: t.active ? D.red : D.ink2, fontSize:13, fontWeight: t.active ? 700 : 500,
          borderBottom: t.active ? '3px solid '+D.red : '3px solid transparent',
          marginBottom:-1, display:'flex', alignItems:'center', gap:6, letterSpacing:'0.01em',
        }}>
          {t.l}
          {t.badge && <span style={{ background: t.active?D.red:D.muted, color:'#fff', fontSize:9, fontWeight:700, padding:'1px 5px', borderRadius:8 }}>{t.badge}</span>}
        </button>
      ))}
    </div>
  );
};

// ---------- Section card with header ---------------------------------------
const Card = ({ title, sub, action, children, pad = 16, accent }) => (
  <div style={{ background:'#fff', border:'1px solid '+D.hair, borderRadius:10, display:'flex', flexDirection:'column', overflow:'hidden' }}>
    {accent && <div style={{ height:3, background: accent }}/>}
    <div style={{ padding:'12px 16px', borderBottom:'1px solid '+D.rule, display:'flex', alignItems:'center', gap:10 }}>
      <div style={{ display:'flex', flexDirection:'column', flex:1 }}>
        <span style={{ fontSize:12, color:D.muted, letterSpacing:'0.08em', fontWeight:600 }}>{title.toUpperCase()}</span>
        {sub && <span style={{ fontSize:11, color:D.faint, marginTop:1 }}>{sub}</span>}
      </div>
      {action}
    </div>
    <div style={{ padding: pad }}>{children}</div>
  </div>
);

// ---------- Status banner (top of page) -------------------------------------
const ReleaseBanner = () => (
  <div style={{
    background:'#fff', border:'1px solid '+D.hair, borderLeft:'4px solid '+D.amber,
    borderRadius:10, padding:'14px 18px', display:'flex', alignItems:'center', gap: 18,
  }}>
    <div style={{ width:42, height:42, borderRadius:'50%', background:D.amberSoft, color:D.amber, display:'flex', alignItems:'center', justifyContent:'center', fontSize:22, fontWeight:700 }}>!</div>
    <div style={{ display:'flex', flexDirection:'column', gap:2, flex:1 }}>
      <span style={{ fontSize:14, fontWeight:700, color:D.ink }}>Aircraft is airworthy. Two items require attention before next flight.</span>
      <span style={{ fontSize:12, color:D.muted }}>SB 70-001 (chip detector inspection) due in 6.4 h · Oxygen pressure below dispatch minimum (1,420 psi vs 1,500 psi). Both flagged below.</span>
    </div>
    <button style={{ padding:'8px 14px', background:'#fff', color:D.ink, border:'1px solid '+D.hair, borderRadius:7, fontSize:12, fontWeight:600, cursor:'pointer' }}>Acknowledge</button>
    <button style={{ padding:'8px 14px', background:D.ink, color:'#fff', border:'none', borderRadius:7, fontSize:12, fontWeight:600, cursor:'pointer' }}>Defer with MEL…</button>
  </div>
);

// ---------- Inspection countdowns -------------------------------------------
const INSPECTIONS = [
  { name: '50-hr Phase Check',          due: 14.0, basis: 'h',     last: '@ 1828.6 h',                           tone: 'good',  detail: 'Engine oil & filter, prop track, gear servicing' },
  { name: '100-hr Inspection',          due: 85.8, basis: 'h',     last: '@ 1756.8 h',                           tone: 'good',  detail: 'Phase 2 of 4 · airframe, controls, ELT' },
  { name: 'Annual Inspection',          due: 137,  basis: 'days',  last: '2025-12-14',                           tone: 'good',  detail: 'CFR 91.409 · A&P/IA' },
  { name: 'Pitot/Static & XPDR',        due: 41,   basis: 'days',  last: '2025-06-21',                           tone: 'good',  detail: '24-mo · CFR 91.411/.413' },
  { name: 'ELT Battery',                due: 218,  basis: 'days',  last: '2025-09-30',                           tone: 'good',  detail: 'AmeriKing AK-451' },
  { name: 'Hot Section Insp (HSI)',     due: 1758, basis: 'h',     last: 'NEW · S/N PCE-RB0814',                  tone: 'good',  detail: 'PT6A-66D · 1800-h interval' },
  { name: 'Compressor Wash',            due: -47,  basis: 'h',     last: '@ 1742 h',                              tone: 'amber', detail: '100-h interval · OVERDUE' },
  { name: 'Oxygen System Hydro',        due: 6.4,  basis: 'h',     last: '2024-08-10',                            tone: 'amber', detail: 'SB 70-001 · 5-yr · service ≤6 h' },
  { name: 'Landing Gear O/H (3000 c)',  due: 894,  basis: 'cyc',   last: '@ 0 cyc',                               tone: 'good',  detail: 'Daher SB 32-002' },
];

const InspectionsCard = () => (
  <Card title="Inspections & Time Limits" sub="9 tracked · ordered by time-to-due" accent={D.red}
    action={<button style={{ background:'transparent', border:'1px solid '+D.hair, color:D.ink2, fontSize:12, fontWeight:600, padding:'5px 10px', borderRadius:6, cursor:'pointer' }}>View all 24 →</button>}>
    <div style={{ display:'grid', gridTemplateColumns:'2fr 1fr 1.4fr 1fr', gap: 0, fontSize:11, color:D.muted, fontWeight:600, letterSpacing:'0.06em', padding:'6px 10px', borderBottom:'1px solid '+D.rule, textTransform:'uppercase' }}>
      <span>Item</span><span style={{ textAlign:'right' }}>Due in</span><span>Last Compliance</span><span>Detail</span>
    </div>
    {INSPECTIONS.map(i => {
      const overdue = i.due < 0;
      const c = overdue ? D.red : i.tone === 'amber' ? D.amber : D.ink;
      const ratio = overdue ? 1 : Math.max(0, Math.min(1, 1 - i.due / (i.basis==='h' ? 100 : i.basis==='cyc' ? 1000 : 365)));
      return (
        <div key={i.name} style={{ display:'grid', gridTemplateColumns:'2fr 1fr 1.4fr 1fr', alignItems:'center', gap: 0, padding:'10px 10px', borderBottom:'1px solid '+D.rule }}>
          <div style={{ display:'flex', flexDirection:'column', gap:3 }}>
            <span style={{ fontSize:13, fontWeight:600, color:D.ink }}>{i.name}</span>
            <div style={{ width:'70%', height:3, background:D.rule, borderRadius:2 }}>
              <div style={{ width: ratio*100 + '%', height:'100%', background: c, borderRadius:2 }}/>
            </div>
          </div>
          <div style={{ textAlign:'right' }}>
            <span style={{ fontFamily:D.mono, fontSize:14, fontWeight:700, color:c }}>
              {overdue ? '−' + Math.abs(i.due).toFixed(0) : i.due % 1 ? i.due.toFixed(1) : i.due}
            </span>
            <span style={{ fontSize:10, color:D.muted, marginLeft:3 }}>{overdue ? i.basis + ' OVER' : i.basis}</span>
          </div>
          <span style={{ fontFamily:D.mono, fontSize:11, color:D.muted }}>{i.last}</span>
          <span style={{ fontSize:11, color:D.ink2 }}>{i.detail}</span>
        </div>
      );
    })}
  </Card>
);

// ---------- Squawks list ----------------------------------------------------
const SQUAWKS = [
  { id: 'SQ-2026-014', sev:'open',  title: 'L generator: intermittent caution on engine start (3rd start cycle)', open:'2026-04-26', tail:'CMP-LOG-0421', mel: false },
  { id: 'SQ-2026-013', sev:'mel',   title: 'Cabin attendant call light inop (P/N CK-22-A)',                      open:'2026-04-22', tail:'D-MEL §25-32', mel: true,  expires:'2026-05-10' },
  { id: 'SQ-2026-012', sev:'open',  title: 'Right brake feels soft after extended taxi · pads measured 4.1 mm',  open:'2026-04-19', tail:'WO-2614',     mel: false },
  { id: 'SQ-2026-011', sev:'mel',   title: 'Co-pilot map light flickers above FL250',                            open:'2026-04-12', tail:'D-MEL §33-04', mel: true,  expires:'2026-05-30' },
  { id: 'SQ-2026-009', sev:'mon',   title: 'Slight oil weep at fuel control unit boss · monitored',              open:'2026-04-04', tail:'WO-2598',     mel: false },
];

const SquawksCard = () => (
  <Card title="Open Squawks · Discrepancies" sub="5 open · 2 deferred under MEL · 1 monitored"
    action={<button style={{ background:'transparent', border:'1px solid '+D.hair, color:D.ink2, fontSize:12, fontWeight:600, padding:'5px 10px', borderRadius:6, cursor:'pointer' }}>+ New squawk</button>}>
    <div style={{ display:'flex', flexDirection:'column', gap:0 }}>
      {SQUAWKS.map((sq, i) => (
        <div key={sq.id} style={{ display:'grid', gridTemplateColumns:'auto auto 1fr auto auto', alignItems:'center', gap:14, padding:'10px 0', borderBottom: i < SQUAWKS.length-1 ? '1px solid '+D.rule : 'none' }}>
          <span style={{
            fontFamily:D.mono, fontSize:10, fontWeight:700, padding:'3px 7px', borderRadius:4,
            background: sq.sev==='open' ? D.amberSoft : sq.sev==='mel' ? D.blueSoft : D.bg,
            color: sq.sev==='open' ? D.amber : sq.sev==='mel' ? D.blue : D.muted,
          }}>{sq.sev==='open'?'OPEN':sq.sev==='mel'?'MEL':'MON'}</span>
          <span style={{ fontFamily:D.mono, fontSize:11, color:D.muted, fontWeight:600 }}>{sq.id}</span>
          <span style={{ fontSize:13, color:D.ink, fontWeight:500 }}>{sq.title}</span>
          <span style={{ fontFamily:D.mono, fontSize:11, color:D.muted }}>opened {sq.open}</span>
          <span style={{ fontFamily:D.mono, fontSize:11, color: sq.mel ? D.blue : D.muted, fontWeight: sq.mel ? 600 : 500 }}>
            {sq.mel ? 'expires '+sq.expires : sq.tail}
          </span>
        </div>
      ))}
    </div>
  </Card>
);

// ---------- AD / SB compliance ----------------------------------------------
const ADSB = [
  { type:'AD',  num:'2024-13-08', title:'PT6A-66D fuel pump drive shaft',          status:'COMPLIED',  basis:'@ 1812 h',          tone:'good' },
  { type:'AD',  num:'2023-21-04', title:'Engine fuel hose replacement',             status:'COMPLIED',  basis:'@ 1654 h',          tone:'good' },
  { type:'SB',  num:'70-001',     title:'Chip detector inspection · recurring',     status:'DUE 6.4 h', basis:'next: 1849.0 h',    tone:'amber' },
  { type:'SB',  num:'53-018',     title:'Aft pressure bulkhead inspection',         status:'DUE 218 d', basis:'last: 2025-09-30',  tone:'good' },
  { type:'SB',  num:'25-014 R2',  title:'Crew oxygen mask hose retention',          status:'COMPLIED',  basis:'2024-11-02',        tone:'good' },
];

const ADSBCard = () => (
  <Card title="Airworthiness · AD / SB" sub="34 reviewed · 1 due ≤10 h · 0 overdue"
    action={<button style={{ background:'transparent', border:'1px solid '+D.hair, color:D.ink2, fontSize:12, fontWeight:600, padding:'5px 10px', borderRadius:6, cursor:'pointer' }}>Compliance ledger →</button>}>
    {ADSB.map((a, i) => (
      <div key={a.num} style={{ display:'grid', gridTemplateColumns:'auto 100px 1fr auto auto', gap:12, alignItems:'center', padding:'9px 0', borderBottom: i<ADSB.length-1 ? '1px solid '+D.rule : 'none' }}>

const Fluid = ({ label, cur, max, unit, right, tone='good' }) => {
  const c = tone === 'red' ? D.red : tone === 'amber' ? D.amber : tone === 'good' ? D.green : D.muted;
  const pct = Math.max(0, Math.min(1, cur/max));
  return (
    <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
      <div style={{ display:'flex', alignItems:'baseline', gap:10 }}>
        <span style={{ fontSize:12, fontWeight:600, color:D.ink }}>{label}</span>
        <span style={{ flex:1 }}/>
        <span style={{ fontFamily:D.mono, fontSize:13, fontWeight:700, color:c }}>{cur}<span style={{ color:D.muted, marginLeft:3, fontWeight:500, fontSize:10 }}>/ {max} {unit}</span></span>
      </div>
      <div style={{ height:8, background:D.rule, borderRadius:4, position:'relative', overflow:'hidden' }}>
        <div style={{ width: pct*100+'%', height:'100%', background:c, borderRadius:4 }}/>
        {tone==='red' && <div style={{ position:'absolute', left: 1500/max*100+'%', top:-2, width:1, height:12, background:D.red, opacity:.4 }}/>}
      </div>
      <span style={{ fontSize:11, color: tone==='red' ? D.red : D.muted }}>{right}</span>
    </div>
  );
};

const Donut = ({ value, color, size = 80 }) => {
  const r = size/2 - 5;
  const c = 2 * Math.PI * r;
  const off = c * (1 - value);
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={D.rule} strokeWidth="6"/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth="6" strokeDasharray={c} strokeDashoffset={off} strokeLinecap="round" transform={`rotate(-90 ${size/2} ${size/2})`}/>
    </svg>
  );
};
