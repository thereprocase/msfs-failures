<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>msfs-failures · home screen variants</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  html, body { margin: 0; padding: 0; background: #1a1815; color: #e8e3da; font-family: "Inter", system-ui, sans-serif; }
  *, *::before, *::after { box-sizing: border-box; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="windows-frame.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="v1-fleet-sidebar.jsx"></script>
<script type="text/babel" src="v2-alerts-split.jsx"></script>
<script type="text/babel" src="v3-live-dispatch.jsx"></script>
<script type="text/babel" src="v4-terminal.jsx"></script>

<script type="text/babel">
const App = () => (
  <DesignCanvas>
    <DCSection
      id="home-variants"
      title="msfs-failures · Home screen"
      subtitle="Maintenance-shop terminal aesthetic · 4 variants exploring layout, hierarchy, and visual style"
      data-screen-label="Home Variants"
    >
      <DCArtboard id="v1" label="V1 · Fleet-first sidebar — calm, balanced, fleet-as-grid" width={1440} height={900}>
        <Variant1/>
      </DCArtboard>
      <DCArtboard id="v2" label="V2 · Alerts-first split — squawks dominate, dispatch ops tone" width={1440} height={900}>
        <Variant2/>
      </DCArtboard>
      <DCArtboard id="v3" label="V3 · Live-first dispatch — glass-cockpit hero, EFB-lite" width={1440} height={900}>
        <Variant3/>
      </DCArtboard>
      <DCArtboard id="v4" label="V4 · Terminal — densest, mono-heavy, logbook software" width={1440} height={900}>
        <Variant4/>
      </DCArtboard>
    </DCSection>

    <DCPostIt x={40} y={40} w={300}>
      <strong>Aesthetic system</strong><br/><br/>
      All four variants share: warm-neutral dark backgrounds, JetBrains Mono for tail numbers / hours / cycles / IDs, Inter for narrative copy. Color is reserved for state — green airworthy, amber MX-due, orange squawk, red grounding. Live state is only shown when a sim aircraft is loaded.
      <br/><br/>
      <strong>Click to explore.</strong> Toggle nav tabs, click fleet rows, expand squawks, and toggle the sim connection in each variant.
    </DCPostIt>
  </DesignCanvas>
);

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
